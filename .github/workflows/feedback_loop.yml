name: Keyword Feedback Loop

on:
  issues:
    types: [opened]

jobs:
  process-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --force-reinstall google-genai
          pip install -r requirements.txt

      - name: Verify Environment and Libraries
        run: |
          python -m pip freeze
          python --version
          python -c "import sys; print('\n'.join(sys.path))"
          python -c "import pkg_resources; print([d.project_name for d in pkg_resources.working_set])"
          
      - name: Verify google-genai installation
        run: python -c "from google import genai; print('google-genai OK')"

      - name: Debug process_feedback.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -m trace -t process_feedback.py

      - name: Extract Keywords with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python process_feedback.py

      - name: Commit New Keywords
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add keywords.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated keyword expansion"
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "Keywords extracted and added to library! Closing issue."
